name: Build Windows exe

on:
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.2'

      - name: Update lang data
        run: dart localization/generator.dart

      - name: Set update check flag
        # El autor lo pide en lib/utils, lo ponemos ahí directamente
        run: |
          cd lib/utils
          echo "const updateCheckFlag = true;" > update_check_flag_file.dart
          cd ../..

      - name: Build Windows Portable (Release)
        run: |
          flutter pub get
          flutter build windows --release

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Harmony-Music-Windows-Portable
          # Subimos la carpeta Release completa para que funcione
          path: build/windows/runner/Release/
