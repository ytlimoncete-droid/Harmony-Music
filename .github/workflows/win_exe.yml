name: Build Windows exe

on:
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.2'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localization
        run: dart localization/generator.dart

      - name: Set update check flag
        shell: pwsh
        run: |
          $flagFile = "lib/utils/update_check_flag_file.dart"
          if (!(Test-Path "lib/utils")) { mkdir "lib/utils" }
          "const updateCheckFlag = true;" | Out-File -FilePath $flagFile -Encoding utf8

      - name: Build Windows Release
        run: flutter build windows --release

      - name: List files (Debug)
        # Esto es para ver en el log exactamente dónde se guardó todo
        run: dir /s build\windows\*.exe

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Harmony-Music-Windows-App
          # ESTA ES LA CLAVE: Subimos todo lo que esté dentro de la carpeta build de Windows
          # Así no dependemos de nombres de carpetas raros
          path: build/windows/x64/runner/Release/
          if-no-files-found: warn

      - name: Upload Backup (If first fails)
        # Si la ruta de arriba falla, este intenta subir TODO lo de Windows
        if: failure() || success()
        uses: actions/upload-artifact@v4
        with:
          name: Harmony-Music-Full-Build-Folder
          path: build/windows/
